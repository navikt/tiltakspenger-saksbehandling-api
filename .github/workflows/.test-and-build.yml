name: Test and build

on:
  workflow_call:
    inputs:
      buildImage:
        required: false
        type: boolean
        default: true
    outputs:
      IMAGE:
        description: "Docker image"
        value: ${{ jobs.build.outputs.IMAGE }}
    secrets:
      SLACK_VARSEL_WEBHOOK_URL:
        required: true

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      # `pull-requests: write` lar `gh pr comment` / `gh api` poste og oppdatere
      # kover-coverage-kommentaren på tilhørende åpen PR.
      pull-requests: write
    outputs:
      IMAGE: ${{ steps.docker-push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test and build application
        run: ./gradlew build --info installDist

      # Kover-rapportene blir alltid generert som del av `check`/`build` (se
      # buildSrc/src/main/kotlin/kover-conventions.gradle.kts):
      #   - HTML-rapporten lastes opp som artifact for drilldown.
      #   - Markdown-oppsummeringen skrives både til GitHub Job Summary og som
      #     en sticky PR-kommentar (uten tredjepartsaction). `koverMarkdownReport`
      #     produserer build/reports/kover/coverage-summary.md.
      - name: Upload Kover HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/
          retention-days: 14

      - name: Append coverage summary to job summary
        if: always() && hashFiles('build/reports/kover/coverage-summary.md') != ''
        run: cat build/reports/kover/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky coverage comment on PR
        if: always() && hashFiles('build/reports/kover/coverage-summary.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `head_ref` er kun satt for pull_request-events; for push-bygg bruker vi
          # `ref_name` (selve branch-navnet) til å slå opp tilhørende åpen PR.
          BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR_NUM=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            echo "Ingen åpen PR for branch '$BRANCH' – hopper over kommentar."
            exit 0
          fi
          # Sticky-tag matcher på første linje i markdown-en fra koverMarkdownReport.
          TAG="<!-- kover-coverage-comment -->"
          BODY_FILE=build/reports/kover/coverage-summary.md
          EXISTING_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUM/comments" \
            --jq ".[] | select(.body | startswith(\"$TAG\")) | .id" | head -n1)
          if [ -n "$EXISTING_ID" ]; then
            # Bygg JSON-payload med jq for å håndtere spesialtegn / linjeskift trygt.
            jq -n --rawfile body "$BODY_FILE" '{body: $body}' \
              | gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING_ID" --input - >/dev/null
            echo "Oppdaterte eksisterende kommentar ($EXISTING_ID) på PR #$PR_NUM."
          else
            gh pr comment "$PR_NUM" --repo "$REPO" --body-file "$BODY_FILE"
            echo "Postet ny kommentar på PR #$PR_NUM."
          fi

      - name: Build and push docker image
        uses: nais/docker-build-push@v0
        id: docker-push
        if: inputs.buildImage == true
        with:
          team: tpts

      - name: Notify Slack in case of build failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          curl -X POST --data-urlencode "payload={ \"attachments\": [{ \"pretext\": \"[${{ github.event.repository.name }}] Build failed :cry:\", \"color\": \"danger\", \"fields\": [ { \"title\": \"Author\", \"value\": \"$AUTHOR\", \"short\": false }, { \"title\": \"Commit\", \"value\": \"<https://github.com/${{ github.repository }}/commit/$GITHUB_SHA|$GITHUB_SHA>\", \"short\": false } ] }] }" $WEBHOOK_URL
        env:
          BRANCH: ${{ github.ref }}
          AUTHOR: ${{ github.event.pusher.name }}
          WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
